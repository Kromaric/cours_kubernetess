apiVersion: v1
kind: Namespace
metadata:
  name: security
  labels:
    app: security

---
# Realm importé au démarrage : client OIDC public + utilisateur de démo.
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm
  namespace: security
data:
  restaurant-realm.json: |
    {
      "realm": "restaurant",
      "enabled": true,
      "clients": [
        {
          "clientId": "restaurant-api",
          "publicClient": true,
          "directAccessGrantsEnabled": true,
          "standardFlowEnabled": true,
          "redirectUris": ["*"],
          "webOrigins": ["*"]
        }
      ],
      "users": [
        {
          "username": "demo",
          "enabled": true,
          "email": "demo@restaurant.local",
          "emailVerified": true,
          "firstName": "Demo",
          "lastName": "User",
          "credentials": [
            { "type": "password", "value": "demo123", "temporary": false }
          ]
        }
      ]
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: security
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.0
          args: ["start-dev", "--import-realm"]
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: "admin"
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              value: "admin"
            # Keycloak est servi sous /auth derrière l'Ingress Traefik
            - name: KC_HTTP_RELATIVE_PATH
              value: "/auth"
            - name: KC_PROXY_HEADERS
              value: "xforwarded"
            - name: KC_HOSTNAME_STRICT
              value: "false"
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "512Mi"
              cpu: "300m"
            limits:
              memory: "1536Mi"
              cpu: "1500m"
          readinessProbe:
            httpGet:
              path: /auth/realms/restaurant
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 20
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
              readOnly: true
      volumes:
        - name: realm-import
          configMap:
            name: keycloak-realm

---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-svc
  namespace: security
  labels:
    app: keycloak
spec:
  type: ClusterIP
  selector:
    app: keycloak
  ports:
    - port: 8080
      targetPort: 8080

---
# Keycloak accessible via http://localhost:8082/auth
# (pas de StripPrefix : KC_HTTP_RELATIVE_PATH=/auth sert nativement sous ce chemin)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak-ingress
  namespace: security
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: localhost
      http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: keycloak-svc
                port:
                  number: 8080
